<!DOCTYPE html>
<html>
<head>
    <title>Future Civil Engineer</title>
    <style>
        body {
            background-color: #f3e5f5; /* Light lilac background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a148c; /* Deep purple text */
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
            border: 3px solid #e1bee7;
        }
        img {
            width: 200px;
            border-radius: 50%; /* Makes photo circular */
            border: 5px solid #ce93d8;
            margin-bottom: 20px;
        }
        h1 { color: #8e24aa; }
        .highlight {
            background-color: #f3e5f5;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="your-photo.jpg" alt="A picture of me">
        <h1>Hi, I'm [Your Name]! ✨</h1>
        <p><strong>Pre-Engineering Student | Future Civil Engineer</strong></p>
        <p>I am passionate about building a better world through <strong>sustainable infrastructure</strong>.</p>
        <div class="highlight">
            🌊 Specialized Interest: Flood-Prone Area Solutions
        </div>
        <p>Building resilient communities, one design at a time.</p>
    </div>
</body>
</html>
